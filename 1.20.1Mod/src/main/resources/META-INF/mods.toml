    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="geckolib"
    mandatory=true
    versionRange="[${geckolib_version},)"
    ordering="BEFORE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="playeranimator"
    mandatory=true
    versionRange="[${playerAnimation_version},)"
    ordering="BEFORE"
    side="BOTH"
