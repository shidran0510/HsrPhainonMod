modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="HSR Phainon"
authors="shidran"
description='''Phainon from "Honkai Star Rail"'''
displayURL="https://www.curseforge.com/minecraft/mc-mods/hsr-phainon"
